spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/MH_G6_BD}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgre}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:LocalDevJwtSecretOnlyForDevNotForProd}
jwt.expiration=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

mindhealth.gemini.api-key=${GEMINI_API_KEY}
mindhealth.encryption.key=${ENCRYPTION_KEY:LocalDevKey12345}

mindhealth.brevo.api-key=${BREVO_API_KEY:}
mindhealth.mail.remitente=${MAIL_REMITENTE:}